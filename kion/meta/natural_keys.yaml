# /v4/compliance/family, /v4/compliance/level -- read_path with {id} stripped)
# return HTTP 405: there is no flat list endpoint, only the parent-scoped
# GET /v4/compliance/program/{id}/family|level. Reclassified read_transform and
# moved to kion/meta/natural_keys.staged.yaml -- see that file for detail.
