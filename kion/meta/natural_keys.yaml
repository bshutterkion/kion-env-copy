# ---------------------------------------------------------------------------
# Onboarded resources (49-resource metadata sweep, feature/engine-onboard-resources).
# Source: .superpowers/onboard/proposals/*.json (one proposal per resource).
# ONLY resources classified "generic" are listed here -- they're copyable via
# the existing metadata-driven engine alone (natural key + references.yaml
# remap, no bespoke code) and are therefore safe for a live `--engine` run
# today. The 21 "hook" + 1 "read_transform" resources from the same sweep have
# NO hook registered in kion/overrides/registry.py yet, so their metadata
# lives in kion/meta/natural_keys.staged.yaml instead -- adding them here
# would make engine_meta() treat them as engine-ready and the generic
# reconcile path would mis-copy them (unmapped owners, dropped type-specific
# nesting, wrong payload shape). See docs/ONBOARDING_REPORT.md for the full
# classification table and the staged worklist.
# ---------------------------------------------------------------------------

# -- classification: generic (copyable by the existing metadata-driven path) --
