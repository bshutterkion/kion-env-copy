# Compound-key / parent-read archetype declarations.
#
# A resource listed here is generated by the compound renderer instead of the
# entity renderer. Its identity is (parent_id, child_id); it has no single-record
# GET, so its read fetches the parent record (the `read` op in
# generator_config.yaml) and extracts the child from a collection field. Create
# returns the parent, so the new child id is inferred by diffing the parent's
# child-record ids before and after the create.
#
# Fields the generator cannot derive from the op-set + SDK AST alone:
#   parent_id_field  model attribute + parent path param (Required, replace)
#   child_id_field   model attribute for the child id (Computed)
#   child_id_param   SDK params field naming the child id (update/delete)
#   collection       field on the parent read payload holding []child
#   record_id_field  field on the child record equal to child_id
#   json_fields      model attributes carried as jx.Raw <-> jsontypes.Normalized

scope_criteria:
  kind: compound_key_parent_read
  parent_id_field: scope_id
  child_id_field: criteria_id
  child_id_param: CriteriaID
  collection: CriteriaRecords
  record_id_field: ID
  json_fields:
    - criteria

aws_resource_tag:
  kind: no_read

ou_cloud_access_role_exemption:
  kind: no_read

project_cloud_access_role_exemption:
  kind: no_read

compliance_control:
  kind: entity
  # DELETE /v4/compliance/program/{id}/control/{controlID}: controlID is the
  # record id; id is the parent program id, sourced from the program_id attribute.
  delete_record_param: ControlID
  delete_extra_param: ID
  delete_extra_field: program_id

global_permission_mapping:
  kind: association
  key_field: app_role_id
  member_fields: [user_ids, user_groups_ids]

funding_source_permission_mapping:
  kind: association
  key_field: app_role_id
  parent_field: funding_source_id
  member_fields: [user_ids, user_groups_ids]

ou_permission_mapping:
  kind: association
  key_field: app_role_id
  parent_field: ou_id
  member_fields: [user_ids, user_groups_ids]

project_permission_mapping:
  kind: association
  key_field: app_role_id
  parent_field: project_id
  member_fields: [user_ids, user_groups_ids]

# Blended: typed public create/update via the SDK, private by-id read + delete
# over raw HTTP (no public by-id GET or DELETE for app-role).
app_role:
  kind: blended

# Fully raw: the public /beta create+update take NO typed body in the SDK
# (PostDashboard(ctx)/PatchDashboard(ctx,params)), so there is nothing to blend —
# the raw archetype already POSTs/PATCHes the public /beta paths.
dashboard:
  kind: raw_http

# Blended: typed public create + delete via the SDK, private by-id read + update
# over raw HTTP (the public /v3 read is list-only; update is private /v2).
project_note:
  kind: blended

# Blended with a declared nested read_shape (array-explode): typed public
# create/update/delete; the private /v2/app-policy read returns permission_roles
# as {permission_id, role_ids[]}, exploded into the model's flat roles pairs.
permission_scheme:
  kind: blended

# Blended with a declared nested read_shape (deep object + key rename): typed
# public create/update/delete; the private /v1/payer read nests the record under
# custom_billing_source and tags the role field role_name (model:
# bucket_access_role).
billing_source:
  kind: blended

# Parent-scoped resource with no by-id GET: the read lists enforcements under the
# project and finds by id; every op takes the project id, update/delete also the
# enforcement id. Create returns a CreatedResponse.
project_enforcement:
  kind: parent_list
  parent_id_field: project_id
  parent_param: ID
  child_param: EnforcementID
  record_type: ProjectEnforcement
  response_type: ProjectEnforcementResponse

# Funding-source and OU enforcement have the identical shape at a different
# parent (see project_enforcement). Note the SDK misspells the funding-source
# record type as FundingSourceEnforcmeent.
funding_source_enforcement:
  kind: parent_list
  parent_id_field: funding_source_id
  parent_param: ID
  child_param: EnforcementID
  record_type: FundingSourceEnforcmeent
  response_type: FundingSourceEnforcementResponse

ou_enforcement:
  kind: parent_list
  parent_id_field: ou_id
  parent_param: ID
  child_param: EnforcementID
  record_type: OUEnforcement
  response_type: OUEnforcementListResponse

# Bespoke archetypes: resource + data source bodies emitted verbatim from
# dedicated templates (internal/kgen/crud/*.gtpl) because their CRUD control
# flow fits no derived archetype. Schemas/models still come from the schema and
# version stages.

# PATCH-only settings singleton: no create/delete endpoint, static id, all
# attributes Optional+Computed, read via GetAppConfigKeyIndex.
app_config:
  kind: singleton

# Entity-polymorphic (account/ou/project parent, entity_id + custom_variable_id
# path params) with jx.Raw value polymorphism (value_string/value_list/
# value_map). Data source brute-force enumerates every entity's overrides.
custom_variable_override:
  kind: cv_override

# Cloud-account convert/move state machine (create-new-in-cache, cache<->project
# convert, project->project move) backed by the accounthelper package. account
# and aws_account share the resource template; their data sources differ
# (account = list+filter, aws_account = by-id). Generating `account` also emits
# the shared accounthelper support package.
account:
  kind: cloud_account
aws_account:
  kind: cloud_account

# Data-source-only package (no resource): only a hand-kept data source body is
# emitted; its schema still comes from the schema stage.
gcp_regions:
  kind: datasource_only
