# ---------------------------------------------------------------------------
# STAGED metadata -- NOT loaded by kion/meta/load.py or kion/engine/setup.py's
# engine_meta(). This file is inert on purpose: every resource below is
# classified "hook" or "read_transform" (49-resource metadata sweep,
# feature/engine-onboard-resources) and has NO build_create_payload / reader
# hook registered in kion/overrides/registry.py yet. Loading these into the
# active kion/meta/natural_keys.yaml would make engine_meta() treat them as
# engine-ready, and a live `--engine` run would fall through to the generic
# reconcile path (kion/engine/reconcile.py's fields-minus-ignores + plain
# reference remap) and mis-copy them -- unmapped owner ids, dropped
# type-specific nesting (e.g. permission_scheme's exploded roles shape), or
# an outright create failure on unresolved required fields.
#
# This file exists purely to carry the already-analyzed natural-key specs
# forward to the future hook-implementation pass so that work doesn't have to
# re-derive them. Once a resource's hook lands in
# kion/overrides/registry.py (or kion/engine/inventory.py for a read_transform
# resource's reader), move its entry from here into kion/meta/natural_keys.yaml.
#
# See docs/ONBOARDING_REPORT.md for the full classification table and the
# per-resource hook_sketch worklist (one section per resource below, keyed by
# resource name).
# ---------------------------------------------------------------------------

